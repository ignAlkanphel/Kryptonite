modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"
issueTrackerURL = "https://github.com/ignAlkanphel/Kryptonite/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''${mod_description}'''
credits = "Lucraft, apace100, eggohito, EdwinMindcraft"

[[mixins]]
config = "${mod_id}.mixins.json"

[[accessTransformers]]
file="META-INF/accesstransformer.cfg"

[modproperties."${mod_id}"."yumi:entrypoints"]
"lambdynlights:initializer" = "net.alkanphel.kryptonite.power.compat.lambdynlights.KryptoniteDynamicLightsInitializer"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "palladium"
type = "required"
versionRange = "${palladium_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "lambdynlights"
type = "optional"
versionRange = "${lambdynamiclights_version_range}"
ordering = "NONE"
side = "CLIENT"